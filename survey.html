<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floral Image Vancouver — Candidate Questionnaire</title>
<meta name="description" content="A thorough 10–15 minute questionnaire for the Floral Image Vancouver role. We read every one personally.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0e0e0e;--charcoal:#1d1b1a;--warm-grey:#6b625a;--sage-deep:#2f4a3a;--sage:#4a6b54;
    --blush:#d9b3aa;--blush-deep:#b88478;--coral:#e07a5f;--cream:#f7f1e8;--ivory:#fbf8f3;--gold:#a88b5a;
    --shadow:0 20px 60px -20px rgba(14,14,14,.35);--shadow-soft:0 10px 30px -10px rgba(14,14,14,.18);
    --rainbow:linear-gradient(90deg,#2dc1a4 0%,#5fc8d4 14%,#6b9bd2 28%,#c47bbf 42%,#e25b7a 56%,#e8843a 70%,#f0b840 84%,#c8d34a 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;color:var(--charcoal);background:linear-gradient(160deg,#161513,#2f4a3a) fixed;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;padding:0 0 60px}
  h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:500;line-height:1.12;letter-spacing:-.01em;color:var(--black)}
  .rainbow-line{height:4px;background:var(--rainbow)}

  /* progress */
  .progwrap{position:sticky;top:0;z-index:30;background:rgba(14,14,14,.92);backdrop-filter:blur(8px);padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.08)}
  .progwrap .inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:16px}
  .progwrap .brand{color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.1rem;white-space:nowrap}
  .progbar{flex:1;height:8px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden}
  .progfill{height:100%;width:0;background:var(--rainbow);transition:width .35s ease}
  .progtxt{color:rgba(255,255,255,.7);font-size:.8rem;white-space:nowrap}

  .stage{max-width:720px;margin:36px auto;padding:0 20px}
  .card{background:var(--ivory);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
  .card .pad{padding:40px}
  .step-eyebrow{font-weight:600;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-bottom:10px}
  .step-title{font-size:clamp(1.7rem,4vw,2.3rem);margin-bottom:10px}
  .step-intro{color:var(--warm-grey);margin-bottom:30px;font-size:1.02rem}

  .q{margin-bottom:30px;padding-bottom:30px;border-bottom:1px solid rgba(0,0,0,.07)}
  .q:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
  .q .label{font-weight:600;font-size:1.05rem;margin-bottom:4px;display:block;color:var(--charcoal)}
  .q .req{color:var(--coral)}
  .q .sub{font-size:.9rem;color:var(--warm-grey);margin-bottom:14px}
  input[type=text],input[type=email],input[type=tel],textarea,select{
    width:100%;padding:13px 15px;border:1.5px solid #ddd5cc;border-radius:10px;font-family:inherit;font-size:1rem;background:#fff;color:var(--charcoal);transition:border-color .15s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--sage)}
  textarea{min-height:120px;resize:vertical}
  .counter{font-size:.8rem;color:var(--warm-grey);text-align:right;margin-top:4px}
  .counter.ok{color:var(--sage);font-weight:600}

  /* options */
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1.5px solid #e3ddd3;border-radius:11px;cursor:pointer;background:#fff;transition:all .12s;font-size:.98rem}
  .opt:hover{border-color:var(--sage);background:#fbfaf7}
  .opt input{margin-top:3px;accent-color:var(--sage);width:17px;height:17px;flex-shrink:0}
  .opt.sel{border-color:var(--sage);background:rgba(74,107,84,.07);box-shadow:0 0 0 1px var(--sage)}

  /* likert */
  .likert{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
  .likert .ltext{font-size:1rem;font-weight:500}
  .lscale{display:flex;gap:6px}
  .lscale label{position:relative;cursor:pointer}
  .lscale input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer}
  .lbubble{width:38px;height:38px;border-radius:50%;border:1.5px solid #d8d0c4;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;color:var(--warm-grey);background:#fff;transition:all .12s}
  .lscale input:checked + .lbubble{background:var(--sage);border-color:var(--sage);color:#fff;transform:scale(1.08)}
  .lkey{display:flex;justify-content:space-between;font-size:.74rem;color:var(--warm-grey);margin-top:8px}
  @media(max-width:560px){.likert{grid-template-columns:1fr}.lbubble{width:34px;height:34px}}

  /* timed memory check */
  .timed{margin-top:6px}
  .btn-reveal{background:var(--sage-deep);color:#fff;border:none;font-family:inherit;font-weight:600;font-size:.98rem;padding:14px 26px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow-soft);transition:transform .15s}
  .btn-reveal:hover{transform:translateY(-2px)}
  .timed-note{background:#fff;border:2px solid var(--sage);border-radius:14px;padding:22px 24px;font-size:1.08rem;line-height:1.55;color:var(--charcoal);box-shadow:var(--shadow-soft);animation:popin .2s ease}
  @keyframes popin{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
  .timed-count{display:inline-flex;align-items:center;gap:8px;margin-top:14px;font-weight:700;color:var(--coral);font-size:1.05rem}
  .timed-count::before{content:"";width:11px;height:11px;border-radius:50%;background:var(--coral);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .timed-ask{margin-top:6px}
  .timed-prompt{font-weight:600;font-size:1.05rem;margin-bottom:12px;color:var(--charcoal)}
  .timed-done{font-size:.85rem;color:var(--sage);font-weight:600;margin-top:8px}

  .err{color:var(--coral);font-size:.85rem;font-weight:600;margin-top:8px;display:none}
  .q.invalid .err{display:block}
  .q.invalid input,.q.invalid textarea,.q.invalid select{border-color:var(--coral)}

  .nav{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:24px 40px;background:#fff;border-top:1px solid rgba(0,0,0,.06)}
  .btn{display:inline-block;background:var(--rainbow);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:1rem;padding:14px 32px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow-soft);transition:transform .15s}
  .btn:hover{transform:translateY(-2px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-back{background:none;color:var(--warm-grey);box-shadow:none;border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:.95rem;padding:14px 8px}
  .btn-back:hover{color:var(--charcoal)}

  /* welcome + done */
  .hero-card{text-align:center}
  .hero-card .logo{width:60px;height:60px;border-radius:12px;margin:0 auto 22px;box-shadow:var(--shadow-soft)}
  .hero-card h1{font-size:clamp(2rem,5vw,2.8rem);margin-bottom:16px}
  .hero-card .accent{font-style:italic;background:var(--rainbow);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero-card p{color:var(--warm-grey);max-width:46ch;margin:0 auto 14px;font-size:1.05rem}
  .timechip{display:inline-flex;align-items:center;gap:8px;background:var(--cream);border-radius:999px;padding:9px 18px;font-size:.9rem;font-weight:600;color:var(--sage-deep);margin:18px 0 26px}
  .donewrap{text-align:center}
  .donewrap .big{font-size:3rem;margin-bottom:10px}
  .hide{display:none !important}
</style>
</head>
<body>

<div class="rainbow-line"></div>
<div class="progwrap" id="progwrap">
  <div class="inner">
    <span class="brand">Floral Image</span>
    <div class="progbar"><div class="progfill" id="progfill"></div></div>
    <span class="progtxt" id="progtxt">Step 1</span>
  </div>
</div>

<div class="stage">
  <div class="card">
    <div class="pad" id="stepbody"></div>
    <div class="nav" id="nav">
      <button class="btn-back" id="backBtn">← Back</button>
      <button class="btn" id="nextBtn">Continue →</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — paste your deployed Google Apps Script Web App URL.
   Until you do, the survey runs in "preview" mode: it computes
   and shows you the score instead of submitting (great for testing).
   ============================================================ */
const ENDPOINT = "https://script.google.com/macros/s/AKfycbwkTIpyImAAc9f8KC0BEIVgsQjTcuQrBpVxiM8-hOnkOgQ-JhdUPZ9nK4x-EawMDzQw7Q/exec";

/* Dimension weights (sum to 100). Sales is re-weighted by track at scoring time. */
const WEIGHTS = { FIT:25, CONS:22, AUTO:18, SALES:18, RELI:7, EFFORT:10 };

/* ---------- Likert helper ---------- */
function L(id, dim, text, reverse=false){ return {type:'likert', id, dim, text, reverse}; }

/* ============================================================
   SURVEY DEFINITION
   ============================================================ */
const STEPS = [

/* 0 — WELCOME */
{ welcome:true },

/* 1 — THE BASICS */
{ eyebrow:"Section 1 of 7", title:"First, the basics",
  intro:"A few quick details so we know who you are and what you're after.",
  questions:[
    {type:'text', id:'name',  label:"Your full name", required:true},
    {type:'email',id:'email', label:"Email", required:true},
    {type:'tel',  id:'phone', label:"Mobile phone", required:true},
    {type:'text', id:'suburb',label:"Which part of Greater Vancouver are you based in?", sub:"e.g. Burnaby, North Shore, Richmond, Surrey…", required:true},
    {type:'radio', id:'track', dim:null, required:true,
      label:"Which best describes what you're looking for?",
      sub:"There's no wrong answer — it just helps us picture the right role for you.",
      options:[
        {t:"A relaxed part-time role as it is now (around 6–7 days a month)", v:'parttime', s:0},
        {t:"I'd like to grow it — build the territory through sales toward more days a week, even full-time", v:'sales', s:0},
        {t:"Honestly not sure yet — open to either", v:'unsure', s:0},
      ]},
    {type:'radio', id:'licence', dim:null, required:true,
      label:"Do you hold a valid BC driver's licence?",
      options:[
        {t:"Yes — a full, current licence", v:'full', s:0},
        {t:"Yes — but with restrictions (e.g. N / graduated)", v:'restricted', s:0},
        {t:"No, not currently", v:'none', s:0, gate:"No current driver's licence"},
      ]},
    {type:'radio', id:'van_comfort', dim:'FIT', required:true,
      label:"How do you feel about driving a company van around the city — the traffic, parking, tight loading zones?",
      options:[
        {t:"Totally comfortable — I'm a confident driver", v:'love', s:5},
        {t:"Fine, I'd settle into it quickly", v:'fine', s:3},
        {t:"A bit nervous about a larger vehicle, but willing", v:'learn', s:2},
        {t:"I'd really rather not drive a van", v:'no', s:0},
      ]},
    {type:'radio', id:'days_pref', dim:null, required:true,
      label:"Roughly how much work are you hoping for?",
      options:[
        {t:"Just the relaxed part-time days (around 6–7 a month)", v:'few', s:0},
        {t:"A couple of days a week", v:'some', s:0},
        {t:"As much as I can build it into — ideally full-time eventually", v:'lots', s:0},
      ]},
  ]},

/* 2 — THE HONEST JOB PREVIEW */
{ eyebrow:"Section 2 of 7", title:"The honest version of the job",
  intro:"Before you go further, here's the real day-to-day — the good and the demanding. Be honest with yourself. The wrong fit doesn't help you or us, and there's no shame in deciding it isn't for you.",
  questions:[
    {type:'radio', id:'p_solo', dim:'FIT', required:true,
      label:"You'll work completely on your own, all day. No team beside you, no manager down the hall — you run your own day and you're essentially your own boss. How does that sit with you?",
      options:[
        {t:"That's exactly what I want — I love working independently", v:'love', s:5},
        {t:"I'm comfortable with it", v:'fine', s:3},
        {t:"I could manage, though I'd miss having people around", v:'tolerate', s:1},
        {t:"Honestly, that would be hard for me — I need a team around me", v:'deal', s:0, gate:"Not comfortable working solo (core to the role)"},
      ]},
    {type:'radio', id:'p_lift', dim:'FIT', required:true,
      label:"Some vases and arrangements can be heavy (think 6–10 kg), and you'll lift and carry them in and out of the van many times a day. Can you do that comfortably and repeatedly?",
      options:[
        {t:"Yes, no problem at all — I'm fit and active", v:'love', s:5},
        {t:"Yes, I can manage it fine", v:'fine', s:3},
        {t:"I could, but lifting like that all day would be a stretch for me", v:'tolerate', s:1},
        {t:"No — that amount of lifting isn't something I can do", v:'deal', s:0, gate:"Cannot do repeated lifting (physical core of the role)"},
      ]},
    {type:'radio', id:'p_weather', dim:'FIT', required:true,
      label:"In summer it's lovely. But you'll also be out in Vancouver winters — rain, cold, on your feet, especially if you're growing the territory. How do you feel about that?",
      options:[
        {t:"Fine by me — I don't mind the weather at all", v:'love', s:5},
        {t:"I can handle it", v:'fine', s:3},
        {t:"I'd push through, but I really don't love being cold and wet", v:'tolerate', s:1},
        {t:"That would genuinely put me off the job", v:'deal', s:0, gate:"Not willing to work outdoors in winter weather"},
      ]},
    {type:'radio', id:'p_pace', dim:'FIT', required:true,
      label:"It's fast-paced — a lot of stops, a tight run, on your feet and moving. Some people love that rhythm; others find it draining. Which are you?",
      options:[
        {t:"I love being busy and on the move — time flies", v:'love', s:5},
        {t:"I'm happy with a busy, active day", v:'fine', s:3},
        {t:"I prefer a slower, steadier pace", v:'tolerate', s:1},
        {t:"A constant fast pace would wear me out", v:'deal', s:0},
      ]},
    {type:'radio', id:'p_repeat', dim:'FIT', required:true,
      label:"The work is rhythmic and repetitive by nature — similar tasks, many stops, week after week. Some people find that calming and satisfying; others get bored. Honestly, which is you?",
      options:[
        {t:"I genuinely like routine — there's comfort in a good rhythm", v:'love', s:5},
        {t:"Repetition doesn't bother me at all", v:'fine', s:3},
        {t:"I can do it, but I do get restless with routine", v:'tolerate', s:1},
        {t:"I'd find that kind of repetition hard to stick with", v:'deal', s:0},
      ]},
    {type:'radio', id:'p_face', dim:'FIT', required:true,
      label:"You're the face of Floral Image to every client — often the only person from the company they ever meet. How do you feel about representing the brand and building those friendly relationships?",
      options:[
        {t:"Love it — I'm a people person and I'd take real pride in it", v:'love', s:5},
        {t:"Comfortable with it", v:'fine', s:3},
        {t:"I can do it, though I'm more reserved by nature", v:'tolerate', s:1},
        {t:"I'd rather just do the work and not be the 'face' of anything", v:'deal', s:0},
      ]},
  ]},

/* 3 — CONSCIENTIOUSNESS & DETAIL */
{ eyebrow:"Section 3 of 7", title:"How you work",
  intro:"For each statement, tell us how much it sounds like you. Be honest — we're looking for the right fit, not a perfect score. (1 = not like me, 5 = exactly like me.)",
  questions:[
    L('c1','CONS',"I keep things organised and I always know where I'm up to."),
    L('c2','CONS',"I double-check my work before I call it finished."),
    L('c3','CONS',"I'm punctual — being late genuinely bothers me."),
    L('c4','CONS',"I notice small details that other people walk right past."),
    L('c5','CONS',"I sometimes start things and leave them half-finished.", true),
    L('c6','CONS',"Routine admin and paperwork bore me, so I tend to skip it.", true),
    L('c7','CONS',"I like having a system or a checklist rather than winging it."),
    L('c8','CONS',"I take real pride in my work looking tidy and presentable."),
    L('c9','CONS',"I'd notice straight away if a vase was a little crooked or a stem out of place."),
    {type:'timed', id:'trap', dim:null, required:true, seconds:10,
      label:"A quick memory check.",
      sub:"Attention to detail is a big part of this role. When you're ready, press the button — a short delivery note appears for 10 seconds, then disappears, and we'll ask you one thing about it. Read carefully: you only get one look.",
      note:"RUN NOTE — 3 stops today. The Maple Street client wants their amber vase swapped out for a fresh white arrangement. Pick up the old vase and leave the invoice on the reception desk.",
      prompt:"From memory: what colour was the NEW arrangement that replaced the amber vase?",
      answer:'white',
      gateMsg:"Failed the attention-to-detail (timed memory) check"},
    {type:'textarea', id:'detail_q', dim:'CONS', required:true, minChars:40, maxScore:5,
      label:"Spot the problem: an invoice says 6 vases were delivered, but your run sheet shows 5 dropped off and 1 still sitting in the van. In a sentence or two — what's wrong, and what would you do?",
      placeholder:"What would you flag, and how would you sort it out?"},
    {type:'textarea', id:'route_q', dim:'CONS', required:true, minChars:50, maxScore:5,
      label:"You've got six stops spread across the city and a set amount of time to do them. In a sentence or two, how would you decide the order you do them in?",
      sub:"There's no single right answer — we just want to see how you think.",
      placeholder:"What would you factor in?"},
  ]},

/* 4 — WORKING SOLO & INITIATIVE */
{ eyebrow:"Section 4 of 7", title:"Out on your own",
  intro:"There's no one looking over your shoulder. These show us how you handle that freedom.",
  questions:[
    {type:'radio', id:'sjt_early', dim:'AUTO', required:true,
      label:"It's 11am and you've finished every scheduled stop early. No one would know either way. What do you actually do?",
      options:[
        {t:"Use the spare time to scope nearby businesses that might want flowers, or get ahead on tomorrow's run", v:'a', s:5},
        {t:"Double back and re-check a couple of today's arrangements to make sure they're perfect", v:'b', s:4},
        {t:"Message the owners to ask if there's anything else useful to do", v:'c', s:2},
        {t:"Call it a day — the work's done", v:'d', s:0},
      ]},
    {type:'radio', id:'sjt_unsure', dim:'AUTO', required:true,
      label:"A client wants something changed about their arrangement and you're not 100% sure exactly what they mean — and you can't reach anyone to ask right then. What's your move?",
      options:[
        {t:"Ask the client a couple of friendly questions, use my judgement, do my best, and note it to confirm later", v:'a', s:5},
        {t:"Make a sensible call myself and leave a clear note about what I did and why", v:'b', s:4},
        {t:"Leave that arrangement as-is until I can check with someone", v:'c', s:1},
        {t:"Keep trying to reach someone before doing anything at all", v:'d', s:0},
      ]},
    {type:'radio', id:'sjt_nocheck', dim:'AUTO', required:true,
      label:"Be honest: when you know absolutely no one will check your work today, what happens to the standard of it?",
      options:[
        {t:"Nothing changes — my standard is my standard, watched or not", v:'a', s:5},
        {t:"It stays high; my own pride keeps it there", v:'b', s:4},
        {t:"It might slip a little on the small stuff", v:'c', s:1},
        {t:"I'll be honest — I work harder when someone's watching", v:'d', s:0},
      ]},
    {type:'radio', id:'sjt_behind', dim:'AUTO', required:true,
      label:"It's been a slow day and you realise you won't finish every stop. What do you do?",
      options:[
        {t:"Prioritise the stops that matter most, do them well, and give a heads-up about the rest", v:'a', s:5},
        {t:"Push hard to fit them all in, even if a couple get a quicker job", v:'b', s:3},
        {t:"Do what I can and flag tomorrow which ones I missed", v:'c', s:2},
        {t:"Get through as many as possible and not worry about the rest", v:'d', s:0},
      ]},
    {type:'radio', id:'sjt_lowday', dim:'AUTO', required:true,
      label:"It's a grey, wet Monday and you're just not feeling it. Nobody is watching. What actually gets you through a full, proper day's work?",
      options:[
        {t:"My own standards — I'd be embarrassed to do a half job, watched or not", v:'a', s:5},
        {t:"I focus on the clients who'll be happy to see fresh flowers", v:'b', s:4},
        {t:"I'd push through, but it'd be a bit of a slog", v:'c', s:2},
        {t:"Honestly, days like that I'd probably do the bare minimum", v:'d', s:0},
      ]},
    L('a1','AUTO',"I'd rather be left alone to get on with it than have regular check-ins."),
    L('a2','AUTO',"I'm good at keeping myself motivated without a boss pushing me."),
  ]},

/* 5 — SALES & COLD CALLING */
{ eyebrow:"Section 5 of 7", title:"Winning new clients",
  intro:"Part of this role — and most of it, if you want to grow it — is offering businesses a free flower trial, then popping back to see if they'd like to keep it. The flowers really do sell themselves, but you have to be willing to knock on the door.",
  questions:[
    {type:'radio', id:'s_door', dim:'SALES', required:true,
      label:"How do you feel about door-to-door visits — walking into a business you've never met and offering them a free flower trial?",
      options:[
        {t:"Love it — I enjoy meeting new people and I'd thrive on that", v:'love', s:5},
        {t:"I'm comfortable with it", v:'fine', s:3},
        {t:"I'd be nervous but willing to learn and push through", v:'learn', s:2},
        {t:"That's really not me — I'd rather not", v:'no', s:0, gateIf:'sales', gate:"Sales track but not willing to do door-to-door"},
      ]},
    {type:'radio', id:'s_reject', dim:'SALES', required:true,
      label:"You've had eight 'no thanks' in a row. How do you feel walking up to door number nine?",
      options:[
        {t:"Fine — every no gets me closer to a yes. On to nine.", v:'a', s:5},
        {t:"A bit deflated, but I keep going", v:'b', s:3},
        {t:"I'd need a break to shake it off before continuing", v:'c', s:1},
        {t:"Eight no's would really knock me — I'd probably stop", v:'d', s:0},
      ]},
    {type:'radio', id:'s_followup', dim:'SALES', required:true,
      label:"You dropped a free trial a week ago. You return and the client says 'we're not sure…'. What do you say or do?",
      options:[
        {t:"Ask what's holding them back, listen, and gently show how easy and good-value it is — let the flowers do the talking", v:'a', s:5},
        {t:"Offer to extend the trial another week so they can see how much they'd miss it", v:'b', s:4},
        {t:"Thank them, leave my card, and follow up later", v:'c', s:2},
        {t:"Take it as a no and collect the arrangement", v:'d', s:0},
      ]},
    {type:'radio', id:'s_complaint', dim:'SALES', required:true,
      label:"A client says their arrangement is looking a bit tired or dated and they're not happy. You're standing right there. What do you do?",
      options:[

const body = document.getElementById('stepbody');
const nav  = document.getElementById('nav');
const backBtn = document.getElementById('backBtn');
const nextBtn = document.getElementById('nextBtn');
const progfill = document.getElementById('progfill');
const progtxt  = document.getElementById('progtxt');
const answers = {};
let cur = 0;

function totalSteps(){ return STEPS.length; }

function render(){
  const step = STEPS[cur];
  body.innerHTML = '';
  // progress
  const pct = Math.round((cur)/(totalSteps()-1)*100);
  progfill.style.width = pct + '%';
  progtxt.textContent = step.welcome ? 'Welcome' : (cur===totalSteps()-1?'Final step':'Step '+cur+' of '+(totalSteps()-1));

  if(step.welcome){ renderWelcome(); return; }

  let html = `<div class="step-eyebrow">${step.eyebrow}</div><h2 class="step-title">${step.title}</h2><p class="step-intro">${step.intro}</p>`;
  step.questions.forEach(q=> html += renderQ(q));
  body.innerHTML = html;
  wireOptions();
  restore(step);
  wireTimed();
  nav.classList.remove('hide');
  backBtn.style.visibility = cur>1 ? 'visible':'hidden';
  nextBtn.textContent = cur===totalSteps()-1 ? 'Submit my answers →' : 'Continue →';
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderQ(q){
  const req = q.required ? ' <span class="req">*</span>':'';
  const sub = q.sub ? `<div class="sub">${q.sub}</div>`:'';
  let inner='';
  if(['text','email','tel'].includes(q.type)){
    inner = `<input type="${q.type}" data-id="${q.id}" placeholder="${q.placeholder||''}">`;
  } else if(q.type==='textarea'){
    inner = `<textarea data-id="${q.id}" data-min="${q.minChars||0}" placeholder="${q.placeholder||''}"></textarea>
             <div class="counter" data-counter="${q.id}">0 characters${q.minChars?` · aim for ${q.minChars}+`:''}</div>`;
  } else if(q.type==='trap'){
    inner = `<input type="text" data-id="${q.id}" data-trap="${q.answer}" placeholder="${q.placeholder||''}">`;
  } else if(q.type==='timed'){
    inner = `<div class="timed" data-timed="${q.id}" data-seconds="${q.seconds||10}">
      <button type="button" class="btn-reveal" data-reveal>👁 Show the note — ${q.seconds||10} seconds, one look</button>
      <div class="timed-note hide" data-note>${q.note}</div>
      <div class="timed-count hide" data-count></div>
      <div class="timed-ask hide" data-ask>
        <div class="timed-prompt">${q.prompt}</div>
        <input type="text" data-id="${q.id}" placeholder="Type your answer from memory…">
        <div class="timed-done">The note is gone now — answer with your best recollection.</div>
      </div>
    </div>`;
  } else if(q.type==='radio'){
    inner = `<div class="opts">` + q.options.map((o,i)=>
      `<label class="opt"><input type="radio" name="${q.id}" data-id="${q.id}" value="${o.v}" data-s="${o.s}" data-gate="${o.gate||''}" data-gateif="${o.gateIf||''}"><span>${o.t}</span></label>`).join('') + `</div>`;
  } else if(q.type==='likert'){
    inner = `<div class="likert"><div class="ltext">${q.text}</div><div class="lscale">` +
      [1,2,3,4,5].map(n=>`<label><input type="radio" name="${q.id}" data-id="${q.id}" value="${n}"><span class="lbubble">${n}</span></label>`).join('') +
      `</div></div><div class="lkey"><span>Not like me</span><span>Exactly like me</span></div>`;
    return `<div class="q" data-q="${q.id}">${inner}<div class="err">Please choose a rating.</div></div>`;
  } else if(q.type==='check'){
    inner = `<div class="opts"><label class="opt"><input type="checkbox" data-id="${q.id}"><span>${q.text}</span></label></div>`;
  }
  return `<div class="q" data-q="${q.id}"><label class="label">${q.label||''}${req}</label>${sub}${inner}<div class="err">This one's required.</div></div>`;
}

function wireOptions(){
  body.querySelectorAll('.opt input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const group = inp.closest('.q');
      group.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      if(inp.type==='checkbox'){ inp.closest('.opt').classList.toggle('sel', inp.checked); }
      else inp.closest('.opt').classList.add('sel');
      group.classList.remove('invalid');
    });
  });
  body.querySelectorAll('.lscale input').forEach(inp=>{
    inp.addEventListener('change', ()=> inp.closest('.q').classList.remove('invalid'));
  });
  body.querySelectorAll('textarea[data-id]').forEach(t=>{
    const c = body.querySelector(`[data-counter="${t.dataset.id}"]`);
    t.addEventListener('input', ()=>{
      const n=t.value.trim().length, min=+t.dataset.min;
      if(c){ c.textContent = `${n} characters${min?` · aim for ${min}+`:''}`; c.classList.toggle('ok', min&&n>=min); }
      t.closest('.q').classList.remove('invalid');
    });
  });
  body.querySelectorAll('input[data-id], textarea[data-id]').forEach(el=>{
    el.addEventListener('input', ()=> el.closest('.q').classList.remove('invalid'));
  });
}

/* Timed memory check: reveal the note for N seconds, then it disappears and
   the answer box appears. One look only — once answered it stays locked. */
function wireTimed(){
  body.querySelectorAll('.timed').forEach(box=>{
    const id = box.dataset.timed, secs = +box.dataset.seconds || 10;
    const btn  = box.querySelector('[data-reveal]');
    const note = box.querySelector('[data-note]');
    const count= box.querySelector('[data-count]');
    const ask  = box.querySelector('[data-ask]');
    // Already answered (e.g. navigated back then forward): lock to answered state.
    if(answers[id]!==undefined && answers[id]!==''){
      btn.classList.add('hide'); note.classList.add('hide'); count.classList.add('hide');
      ask.classList.remove('hide');
      return;
    }
    btn.addEventListener('click', ()=>{
      btn.classList.add('hide');
      note.classList.remove('hide');
      count.classList.remove('hide');
      let t = secs;
      count.textContent = `Disappears in ${t}s`;
      const iv = setInterval(()=>{
        t--;
        if(t>0){ count.textContent = `Disappears in ${t}s`; return; }
        clearInterval(iv);
        note.classList.add('hide');
        count.classList.add('hide');
        ask.classList.remove('hide');
        const inp = ask.querySelector('input'); if(inp) inp.focus();
      }, 1000);
    });
  });
}

function restore(step){
  step.questions.forEach(q=>{
    const v = answers[q.id];
    if(v===undefined) return;
    if(['text','email','tel','textarea','trap','timed'].includes(q.type)){
      const el = body.querySelector(`[data-id="${q.id}"]`); if(el){ el.value=v; el.dispatchEvent(new Event('input')); }
    } else if(q.type==='check'){
      const el = body.querySelector(`[data-id="${q.id}"]`); if(el){ el.checked=!!v; if(v) el.closest('.opt').classList.add('sel'); }
    } else {
      const el = body.querySelector(`input[name="${q.id}"][value="${v}"]`); if(el){ el.checked=true; el.dispatchEvent(new Event('change')); }
    }
  });
}

function collect(step){
  let ok = true;
  step.questions.forEach(q=>{
    const group = body.querySelector(`[data-q="${q.id}"]`);
    let val;
    if(['text','email','tel','textarea','trap','timed'].includes(q.type)){
      val = (body.querySelector(`[data-id="${q.id}"]`)||{}).value || '';
      val = val.trim();
    } else if(q.type==='check'){
      val = (body.querySelector(`[data-id="${q.id}"]`)||{}).checked || false;
    } else {
      const sel = body.querySelector(`input[name="${q.id}"]:checked`);
      val = sel ? sel.value : '';
    }
    // validation
    let bad = false;
    if(q.required){
      if(q.type==='check') bad = !val;
      else bad = (val==='' || val===undefined);
    }
    if(!bad && q.type==='textarea' && q.minChars && val.length < q.minChars) bad = true;
    if(bad){ ok=false; if(group){ group.classList.add('invalid'); const e=group.querySelector('.err'); if(e){ if(q.type==='textarea'&&q.minChars&&val&&val.length<q.minChars) e.textContent=`Please write at least ${q.minChars} characters — the detail really helps.`; else if(q.type==='timed') e.textContent='Press the button, read the note, then answer from memory to continue.'; } } }
    answers[q.id] = (q.type==='likert') ? (val?+val:'') : val;
  });
  return ok;
}

nextBtn.onclick = ()=>{
  const step = STEPS[cur];
  if(!collect(step)){
    const firstBad = body.querySelector('.q.invalid');
    if(firstBad) firstBad.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(cur===totalSteps()-1){ submit(); return; }
  cur++; render();
};
backBtn.onclick = ()=>{ if(cur>1){ cur--; render(); } };

/* ============================================================
   SCORING
   ============================================================ */
function scoreAll(){
  const dims = {FIT:{r:0,m:0},CONS:{r:0,m:0},AUTO:{r:0,m:0},SALES:{r:0,m:0},RELI:{r:0,m:0},EFFORT:{r:0,m:0}};
  const gates = [];
  let attention = 'ok';
  const track = answers.track || 'unsure';

  STEPS.forEach(step=>{
    if(!step.questions) return;
    step.questions.forEach(q=>{
      const v = answers[q.id];
      if(q.type==='radio'){
        if(!q.dim) { // check gates on non-scored radios (licence etc.)
          const opt = (q.options||[]).find(o=>o.v===v);
          if(opt && opt.gate) gates.push(opt.gate);
          return;
        }
        const opt = (q.options||[]).find(o=>o.v===v);
        const max = Math.max(...q.options.map(o=>o.s));
        dims[q.dim].m += max;
        if(opt){
          dims[q.dim].r += opt.s;
          if(opt.gate){
            if(!opt.gateIf || opt.gateIf===track) gates.push(opt.gate);
          }
        }
      } else if(q.type==='likert'){
        dims[q.dim].m += 5;
        const raw = v ? (q.reverse ? 6 - v : v) : 0;
        dims[q.dim].r += raw;
      } else if(q.type==='textarea' && q.dim){
        const len = (v||'').length, min = q.minChars||100;
        // effort/quality proxy from length, capped
        let s = 0;
        if(len >= min*1.6) s = q.maxScore;
        else if(len >= min) s = q.maxScore*0.7;
        else if(len >= min*0.5) s = q.maxScore*0.35;
        dims[q.dim].m += q.maxScore;
        dims[q.dim].r += s;
      } else if(q.type==='trap'){
        const good = (v||'').toLowerCase().includes((q.answer||'').toLowerCase());
        if(!good) gates.push(q.gateMsg||'Failed attention check');
      } else if(q.type==='timed'){
        // Soft flag, not a knockout: a missed 10-second recall just gets reviewed.
        const good = (v||'').toLowerCase().includes((q.answer||'').toLowerCase());
        if(!good) attention = 'check';
      }
    });
  });

  // weights, re-weighting sales by track
  const W = {...WEIGHTS};
  if(track==='parttime'){ const moved = W.SALES*0.5; W.SALES -= moved; W.FIT += moved; }

  let total = 0; const sub = {};
  Object.keys(dims).forEach(d=>{
    const pct = dims[d].m>0 ? dims[d].r/dims[d].m : 0;
    sub[d] = Math.round(pct*100);
    total += pct * (W[d]||0);
  });
  total = Math.round(total);

  // consistency: solo preference (a1 high) vs x1 reverse (busy team)
  let consistency = 'ok';
  if(answers.a1 && answers.x1){
    const solo = +answers.a1;           // high = likes solo
    const team = 6 - (+answers.x1);     // x1 reverse already; raw answers.x1 high = prefers team
    if(Math.abs(solo - (+answers.x1)) >= 3 && (solo>=4 && (+answers.x1)>=4)) consistency='check';
  }

  let rec, recClass;
  if(gates.length){ rec='Screened out'; recClass='out'; }
  else if(total>=78){ rec='★ Strong — invite to trial day'; recClass='strong'; }
  else if(total>=62){ rec='Maybe — worth a closer look'; recClass='maybe'; }
  else { rec='Likely pass'; recClass='pass'; }

  return {total, sub, gates, rec, recClass, track, consistency, attention};
}

/* ============================================================
   SUBMIT
   ============================================================ */
function submit(){
  nextBtn.disabled = true; nextBtn.textContent = 'Sending…';
  const result = scoreAll();
  const payload = {
    submitted_at: new Date().toISOString(),
    name: answers.name||'', email: answers.email||'', phone: answers.phone||'', suburb: answers.suburb||'',
    track: result.track,
    total_score: result.total,
    recommendation: result.rec,
    screened_out: result.gates.length ? 'YES':'',
    knockouts: result.gates.join(' | '),
    consistency_flag: result.consistency==='check' ? 'REVIEW' : '',
    attention_flag: result.attention==='check' ? 'REVIEW — missed memory check' : '',
    score_fit: result.sub.FIT, score_conscientiousness: result.sub.CONS, score_autonomy: result.sub.AUTO,
    score_sales: result.sub.SALES, score_reliability: result.sub.RELI, score_effort: result.sub.EFFORT,
    answers_json: JSON.stringify(answers)
  };

  const done = ()=> showDone(result);

  if(!ENDPOINT || ENDPOINT.includes('REPLACE_WITH')){
    // preview mode — show the computed result so you can test the scoring
    showPreview(result, payload);
    return;
  }
  fetch(ENDPOINT, {method:'POST', mode:'no-cors', body:new URLSearchParams(payload)})
    .then(done)
    .catch(()=> showDone(result, true));
}

function showDone(result, warn){
  nav.classList.add('hide');
  progfill.style.width='100%'; progtxt.textContent='Done';
  body.innerHTML = `
    <div class="donewrap">
      <div class="big">🌸</div>
      <h1 style="font-size:2.2rem;margin-bottom:12px">Thank you — that's everything.</h1>
      <p style="color:var(--warm-grey);max-width:44ch;margin:0 auto 16px">We read every questionnaire personally. If you look like a great fit, we'll be in touch to arrange a trial day out on the road with Brandon so you can see the role for real.</p>
      <p style="color:var(--warm-grey);max-width:44ch;margin:0 auto">Thanks for taking the time — it genuinely tells us a lot.</p>
      ${warn?'<p style="color:var(--coral);font-size:.85rem;margin-top:18px">(If you saw any error sending, please email us to confirm.)</p>':''}
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* Preview mode (only shown when no endpoint is configured) */
function showPreview(result, payload){
  nav.classList.add('hide');
  progfill.style.width='100%'; progtxt.textContent='Preview';
  const color = {strong:'#4a6b54',maybe:'#a88b5a',pass:'#6b625a',out:'#e07a5f'}[result.recClass];
  body.innerHTML = `
    <div class="step-eyebrow">Preview mode — no backend connected yet</div>
    <h2 class="step-title">Computed evaluation</h2>
    <p class="step-intro">This is what would be written to your Google Sheet. Connect the Apps Script URL (see SETUP) to go live; then candidates see only a thank-you screen.</p>
    <div style="background:#fff;border-radius:14px;padding:24px;box-shadow:var(--shadow-soft);margin-bottom:18px">
      <div style="font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--warm-grey)">Recommendation</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:2rem;color:${color};font-weight:600">${result.rec}</div>
      <div style="font-size:3rem;font-family:'Cormorant Garamond',serif;color:var(--sage-deep);font-weight:600">${result.total}<span style="font-size:1rem;color:var(--warm-grey)"> / 100</span></div>
      ${result.gates.length?`<div style="color:#e07a5f;font-weight:600;margin-top:8px">Knockouts: ${result.gates.join('; ')}</div>`:''}
      ${result.consistency==='check'?`<div style="color:#a88b5a;font-weight:600;margin-top:6px">Consistency: worth reviewing</div>`:''}
      ${result.attention==='check'?`<div style="color:#a88b5a;font-weight:600;margin-top:6px">Memory check: missed — worth reviewing (not a knockout)</div>`:''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      ${Object.entries({Fit:'FIT',Detail:'CONS',Solo:'AUTO',Sales:'SALES',Reliable:'RELI',Effort:'EFFORT'}).map(([k,d])=>
        `<div style="background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow-soft)"><div style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--sage-deep);font-weight:600">${result.sub[d]}</div><div style="font-size:.78rem;color:var(--warm-grey)">${k}</div></div>`).join('')}
    </div>
    <button class="btn" onclick="location.reload()">↺ Test again</button>`;
  window.scrollTo({top:0,behavior:'smooth'});
  console.log('Survey payload →', payload);
}

render();
</script>
